name: deploy-prod

# Production deploy, triggered ONLY by a merge to main. This workflow is the
# single source of prod deploys — disable Vercel's automatic production Git
# deploys so ordering is deterministic (migrations first, then code).
#
# Gated by the `production` GitHub Environment, which has Required Reviewers = you.
# Nothing deploys until you approve in the GitHub UI.
on:
  push:
    branches: [main]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    environment: production # <- required-reviewer approval gate lives here
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # 1) Migrations FIRST. Expand/contract migrations mean the currently-live
      #    code keeps working against the new schema during the window.
      # Pin a concrete CLI version (matches local) — `latest` resolves the newest
      # release via an unauthenticated GitHub API call, which gets rate-limited on
      # shared runner IPs and fails the whole deploy. Pinning also keeps prod
      # deploys reproducible instead of silently upgrading the CLI each run.
      - uses: supabase/setup-cli@v1
        with:
          version: 2.106.0
      - name: Apply database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
          supabase db push

      # 2) Code SECOND, only if migrations succeeded.
      - name: Deploy to Vercel production
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          pnpm dlx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          pnpm dlx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          pnpm dlx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
